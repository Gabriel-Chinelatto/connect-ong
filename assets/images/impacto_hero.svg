  <g transform="translate(80,48)">
    <path d="M50,84 C50,84 12,58 12,38 C12,24 26,19 36,27 C43,32 50,43 50,43 C50,43 57,32 64,27 C74,19 88,24 88,38 C88,58 50,84 50,84 Z"
