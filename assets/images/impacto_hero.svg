    <circle cx="218" cy="95"  r="6" fill-opacity="0.55"/>
    <circle cx="130" cy="9"   r="6" fill-opacity="0.55"/>
    <circle cx="130" cy="181" r="6" fill-opacity="0.55"/>
    <circle cx="70"  cy="32"  r="5" fill="#A8DBC1"/>
    <circle cx="190" cy="32"  r="5" fill="#A8DBC1"/>
    <circle cx="70"  cy="158" r="5" fill="#A8DBC1"/>
    <circle cx="190" cy="158" r="5" fill="#A8DBC1"/>
  </g>

