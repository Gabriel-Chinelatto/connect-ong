name: Flutter CI (Doador)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Baixar dependencias
        run: flutter pub get

      - name: Analise estatica
        run: flutter analyze

      - name: Testes
        run: flutter test
